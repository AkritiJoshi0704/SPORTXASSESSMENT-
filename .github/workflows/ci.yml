name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show Node & npm versions
        run: |
          node -v
          npm -v

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend tests (no coverage)
        run: |
          cd backend
          npx jest --runInBand

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build
